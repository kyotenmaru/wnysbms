<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ระบบจัดการพฤติกรรมนักเรียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* (CSS ความสวยงามของหน้า Dashboard) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { background-color: #f3f4f6; color: #333; display: flex; min-height: 100vh; overflow-x: hidden; }
        
        /* Sidebar */
        .sidebar { width: 250px; background-color: #0f172a; color: white; transition: all 0.3s ease; position: fixed; height: 100vh; z-index: 100; left: 0; top: 0; padding-top: 20px; }
        .sidebar.hidden { left: -250px; }
        .sidebar-header { text-align: center; padding: 0 20px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
        .sidebar-header h3 { font-size: 18px; color: #60a5fa; margin-top: 10px; }
        .menu-item { padding: 15px 25px; display: block; color: #cbd5e1; text-decoration: none; transition: 0.2s; }
        .menu-item:hover { background-color: rgba(255,255,255,0.1); color: white; border-left: 4px solid #ec4899; }
        
        /* Main Content */
        .main-content { flex: 1; margin-left: 250px; transition: all 0.3s ease; padding: 20px 30px; width: calc(100% - 250px); }
        .main-content.expanded { margin-left: 0; width: 100%; }
        
        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .toggle-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #0f172a; transition: 0.2s; }
        .toggle-btn:hover { color: #ec4899; }
        .greeting { font-size: 18px; font-weight: 500; color: #1e293b; }
        .header-right { text-align: right; }
        .clock-display { font-size: 16px; font-weight: 500; color: #3b82f6; }
        .academic-year { font-size: 13px; color: #64748b; margin-top: 4px; }
        
        /* Cards */
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card.total { border-left: 5px solid #3b82f6; }
        .card.pending { border-left: 5px solid #eab308; }
        .card.inprogress { border-left: 5px solid #f97316; }
        .card.done { border-left: 5px solid #22c55e; }
        .card h4 { font-size: 15px; color: #64748b; font-weight: 400; margin-bottom: 10px; }
        .card .number { font-size: 32px; font-weight: 600; color: #0f172a; }
        
        @media screen and (max-width: 768px) { .sidebar { left: -250px; } .sidebar.active { left: 0; } .main-content { margin-left: 0; width: 100%; padding: 15px; } header { flex-direction: column; align-items: flex-start; gap: 15px; } .header-right { text-align: left; } }
    </style>
</head>
<body style="display: none;"> <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>SBMS</h3>
            <p style="font-size: 12px; color: #94a3b8;">ระบบจัดการพฤติกรรม</p>
        </div>
        <a href="#" class="menu-item">📊 แดชบอร์ด</a>
        <a href="#" class="menu-item">📝 เพิ่มข้อมูลเคส</a>
        <a href="#" class="menu-item">🚪 ออกจากระบบ</a>
    </div>

    <div class="main-content" id="mainContent">
        <header>
            <div class="header-left">
                <button class="toggle-btn" id="toggleBtn">☰</button>
                <div class="greeting">กำลังโหลดข้อมูล...</div>
            </div>
            <div class="header-right">
                <div class="clock-display" id="realtimeClock">กำลังโหลดเวลา...</div>
                <div class="academic-year" id="academicYear">กำลังโหลดปีการศึกษา...</div>
            </div>
        </header>

        <div class="dashboard-cards">
            <div class="card total">
                <h4>จำนวนเคสทั้งหมด</h4>
                <div class="number">...</div>
            </div>
            <div class="card pending">
                <h4>รับเรื่องแล้ว</h4>
                <div class="number">...</div>
            </div>
            <div class="card inprogress">
                <h4>กำลังดำเนินการ</h4>
                <div class="number">...</div>
            </div>
            <div class="card done">
                <h4>ดำเนินการแล้วเสร็จ</h4>
                <div class="number">...</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // ส่วนที่ 1: ระบบรักษาความปลอดภัย (Security Guard)
        // ==========================================
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPtUqT1YUbY9kBmumY5Rrcqy-ib_ShK30-NLIKtihRhIPj_wQWQyeLaiTfavuLMm2-RQ/exec'; // <--- ใส่ URL ตรงนี้ให้เหมือนหน้า index
        const authToken = sessionStorage.getItem('authToken');
        
        // 1.1 ตรวจตั๋ว: ถ้าไม่มีตั๋ว ให้เตะกลับไปหน้า Login ทันที
        if (!authToken) {
            alert("คุณไม่ได้รับสิทธิ์เข้าถึง กรุณาเข้าสู่ระบบก่อนครับ");
            window.location.href = 'index.html';
        } else {
            // 1.2 ถ้ามีตั๋ว: ค่อยโชว์หน้าจอขาวๆ ขึ้นมา (ที่เราซ่อนไว้ในแท็ก body)
            document.body.style.display = 'flex';
        }

        // ==========================================
        // ส่วนที่ 2: ดึงข้อมูลเมื่อหน้าเว็บโหลดเสร็จ
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            // ดึงชื่อคุณครูจากกระเป๋า Session มาแสดงผล
            const fullName = sessionStorage.getItem('fullName');
            document.querySelector('.greeting').innerText = `สวัสดี คุณครู${fullName}`;
            
            // สั่งให้ไปดึงข้อมูลสถิติตัวเลขจาก Google Sheets
            fetchDashboardData();
        });

        // ==========================================
        // ส่วนที่ 3: ฟังก์ชันคุยกับ Apps Script
        // ==========================================
        function fetchDashboardData() {
            // ส่งบุรุษไปรษณีย์ไปขอดึงข้อมูล พร้อม "แนบตั๋ว (Token)" ไปด้วย
            fetch(APPS_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    action: "getDashboardStats",
                    token: authToken // <--- ส่งตั๋วไปให้หลังบ้านตรวจ
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    // ถ้าตั๋วของจริง หลังบ้านจะส่งตัวเลขมาให้ เราก็เอาไปแปะในการ์ด
                    document.querySelector('.card.total .number').innerText = data.total;
                    document.querySelector('.card.pending .number').innerText = data.pending;
                    document.querySelector('.card.inprogress .number').innerText = data.inProgress;
                    document.querySelector('.card.done .number').innerText = data.done;
                } else {
                    // ถ้าตั๋วปลอม หรือหมดอายุ
                    alert("เซสชันไม่ถูกต้อง: " + data.message);
                    sessionStorage.clear(); // ฉีกตั๋วทิ้ง
                    window.location.href = 'index.html'; // เตะกลับหน้า Login
                }
            })
            .catch(error => {
                console.error("Error:", error);
                alert("เชื่อมต่อฐานข้อมูลล้มเหลว");
            });
        }

        // ==========================================
        // ส่วนเสริม: ระบบเวลาและปุ่มต่างๆ
        // ==========================================
        // ปุ่มออกจากระบบ
        document.querySelectorAll('.menu-item')[2].addEventListener('click', function() {
            sessionStorage.clear(); // ล้างกระเป๋า
            window.location.href = 'index.html'; // กลับหน้า Login
        });

        // เปิดปิด Sidebar
        document.getElementById('toggleBtn').addEventListener('click', () => {
            if(window.innerWidth > 768) {
                document.getElementById('sidebar').classList.toggle('hidden');
                document.getElementById('mainContent').classList.toggle('expanded');
            } else {
                document.getElementById('sidebar').classList.toggle('active');
            }
        });

        // นาฬิกาและปีการศึกษา
        function updateDateTime() {
            const now = new Date();
            const daysTh = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
            const monthsTh = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];
            const y = now.getFullYear() + 543;
            document.getElementById('realtimeClock').innerText = `วัน${daysTh[now.getDay()]}ที่ ${now.getDate()} ${monthsTh[now.getMonth()]} พ.ศ. ${y} | ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')} น.`;
            document.getElementById('academicYear').innerText = `ปีการศึกษา ${now.getMonth() < 4 ? y - 1 : y}`;
        }
        setInterval(updateDateTime, 1000); updateDateTime();
    </script>
</body>
</html>
