<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ระบบจัดการพฤติกรรมนักเรียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>SBMS</h3>
            <p style="font-size: 12px; color: #94a3b8;">ระบบจัดการพฤติกรรม</p>
        </div>
        <a href="#" class="menu-item">📊 แดชบอร์ด</a>
        <a href="#" class="menu-item">📝 เพิ่มข้อมูลเคส</a>
        <a href="#" class="menu-item">📋 รายการทั้งหมด</a>
        <a href="#" class="menu-item">⚙️ ตั้งค่าระบบ</a>
    </div>

    <div class="main-content" id="mainContent">
        <header>
            <div class="header-left">
                <button class="toggle-btn" id="toggleBtn">☰</button>
                <div class="greeting">กำลังโหลดข้อมูล...</div>
            </div>
            
            <div class="header-right">
                <div class="clock-display" id="realtimeClock">กำลังโหลดเวลา...</div>
                <div class="academic-year" id="academicYear">กำลังโหลดปีการศึกษา...</div>
            </div>
        </header>

        <div class="dashboard-cards">
            <div class="card total">
                <h4>จำนวนเคสทั้งหมด</h4>
                <div class="number">...</div>
            </div>
            <div class="card pending">
                <h4>รับเรื่องแล้ว (รอดำเนินการ)</h4>
                <div class="number">...</div>
            </div>
            <div class="card inprogress">
                <h4>กำลังดำเนินการ</h4>
                <div class="number">...</div>
            </div>
            <div class="card done">
                <h4>ดำเนินการแล้วเสร็จ</h4>
                <div class="number">...</div>
            </div>
        </div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPtUqT1YUbY9kBmumY5Rrcqy-ib_ShK30-NLIKtihRhIPj_wQWQyeLaiTfavuLMm2-RQ/exec';

        // 1. ตรวจสอบบัตรผ่าน (Token) ก่อนโหลดหน้า
        const authToken = sessionStorage.getItem('authToken');
        if (!authToken) {
            window.location.href = 'index.html'; // ถ้าไม่มีให้เด้งออกทันที (จอยังมืดอยู่)
        }

        // 2. ดึงข้อมูลมาแสดงผล
        document.addEventListener('DOMContentLoaded', () => {
            const fullName = sessionStorage.getItem('fullName');
            if(fullName) {
                document.querySelector('.greeting').innerText = `สวัสดี คุณครู${fullName}`;
            }
            
            fetchDashboardData();
        });

        // 3. ฟังก์ชันดึงสถิติ
        function fetchDashboardData() {
            fetch(APPS_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    action: "getDashboardStats",
                    token: authToken
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    document.querySelector('.card.total .number').innerText = data.total;
                    document.querySelector('.card.pending .number').innerText = data.pending;
                    document.querySelector('.card.inprogress .number').innerText = data.inProgress;
                    document.querySelector('.card.done .number').innerText = data.done;
                } else {
                    alert("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่");
                    sessionStorage.clear();
                    window.location.href = 'index.html';
                }
            })
            .catch(err => console.error("Data Fetch Error:", err));
        }

        // 4. ระบบ Sidebar และนาฬิกา
        const toggleBtn = document.getElementById('toggleBtn');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');

        toggleBtn.addEventListener('click', () => {
            if(window.innerWidth > 768) {
                sidebar.classList.toggle('hidden');
                mainContent.classList.toggle('expanded');
            } else {
                sidebar.classList.toggle('active');
            }
        });

        function updateDateTime() {
            const now = new Date();
            const daysTh = ['อาทิตย์', 'จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์', 'เสาร์'];
            const monthsTh = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

            const dayName = daysTh[now.getDay()];
            const d = now.getDate();
            const m = now.getMonth();
            const y = now.getFullYear() + 543;

            const h = String(now.getHours()).padStart(2, '0');
            const min = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('realtimeClock').innerText = `วัน${dayName}ที่ ${d} ${monthsTh[m]} พ.ศ. ${y} | ${h}:${min}:${s} น.`;

            let academicYear = y;
            if (m < 4) academicYear -= 1;
            document.getElementById('academicYear').innerText = `ปีการศึกษา ${academicYear}`;
        }

        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>
</html>
