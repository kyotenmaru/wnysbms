<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบบันทึกพฤติกรรม</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* ตั้งค่าพื้นฐาน */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif; /* ใช้ฟอนต์ภาษาไทยที่ดูทันสมัย */
        }

        /* พื้นหลังไล่สีแบบ Modern */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* กล่อง Login สไตล์ Glassmorphism */
        .login-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px); /* เอฟเฟกต์กระจกฝ้า */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: #ffffff;
        }

        .login-container h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .login-container p {
            font-size: 14px;
            font-weight: 300;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.8);
        }

        /* ช่องกรอกข้อมูล */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: #ffffff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* เอฟเฟกต์ตอนคลิกที่ช่องกรอก */
        .input-group input:focus {
            background: rgba(255, 255, 255, 0.25);
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* ปุ่ม Login */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: #ffffff;
            color: #764ba2;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .login-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>ระบบจัดการข้อมูล</h2>
        <p>สำหรับบุคลากรที่ได้รับอนุญาตเท่านั้น</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้งาน" required>
            </div>
            
            <div class="input-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required>
            </div>

            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
        </form>
    </div>

    <script>
        // โค้ดส่วนนี้เตรียมไว้สำหรับเชื่อมต่อกับ Apps Script ในอนาคต
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // ตรงนี้สามารถเขียนโค้ด fetch() ส่งข้อมูลไปให้ Apps Script ตรวจสอบรหัสผ่านได้เลย
            console.log("พยายามเข้าสู่ระบบด้วย:", user);
            alert("เดี๋ยวเราจะเอาข้อมูลนี้ไปเช็คสิทธิ์กับ Apps Script อีกทีครับ!");
        });
    </script>

</body>
</html>
