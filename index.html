<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบจัดการพฤติกรรมนักเรียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(-45deg, #0f172a, #1e3a8a, #831843, #4c0519);
            background-size: 400% 400%;
            animation: gradientBG 60s ease infinite;
            position: relative;
            overflow: hidden; 
            padding: 20px;
            /* Transition เอฟเฟกต์ขาออก */
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
        }

        body.fade-out {
            opacity: 0;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; 
            background-image: conic-gradient(
                rgba(255, 255, 255, 0.025) 90deg,
                transparent 90deg 180deg,
                rgba(255, 255, 255, 0.025) 180deg 270deg,
                transparent 270deg
            );
            background-size: 60px 60px; 
            animation: moveCheckerboard 60s linear infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes moveCheckerboard {
            0% { background-position: 0px 0px; }
            100% { background-position: 120px 120px; }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 45px 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4);
            text-align: center;
            color: #ffffff;
        }

        .login-container h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .login-container p { font-size: 13px; font-weight: 300; margin-bottom: 30px; color: rgba(255, 255, 255, 0.7); }

        .input-group { margin-bottom: 22px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 8px; color: rgba(255, 255, 255, 0.85); }
        .input-group input { width: 100%; padding: 14px 16px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: #ffffff; font-size: 16px; outline: none; transition: 0.3s; }
        .input-group input:focus { background: rgba(255, 255, 255, 0.15); border-color: #ffffff; }

        .login-btn { width: 100%; padding: 14px; background: #ffffff; color: #831843; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .login-btn:hover:not(:disabled) { background: #f8f9fa; transform: translateY(-2px); }

        /* แถบ Progress Bar */
        .progress-wrapper { display: none; margin-top: 20px; text-align: center; }
        .progress-container { width: 100%; background: rgba(255, 255, 255, 0.1); height: 8px; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #3b82f6, #ec4899); transition: width 0.4s ease; }
        .progress-text { font-size: 12px; color: rgba(255, 255, 255, 0.8); margin-top: 8px; display: block; }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>ระบบจัดการพฤติกรรมนักเรียน</h2>
        <p>Student Behavior Management System</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้งาน</label>
                <input type="text" id="username" required>
            </div>
            
            <div class="input-group">
                <label for="password">รหัสผ่าน</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>

            <div class="progress-wrapper" id="progressWrapper">
                <div class="progress-container">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="progress-text" id="progressStatus">กำลังเตรียมการ... 0%</span>
            </div>
        </form>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPtUqT1YUbY9kBmumY5Rrcqy-ib_ShK30-NLIKtihRhIPj_wQWQyeLaiTfavuLMm2-RQ/exec';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const btn = document.querySelector('.login-btn');
            const wrapper = document.getElementById('progressWrapper');
            const fill = document.getElementById('progressFill');
            const status = document.getElementById('progressStatus');

            btn.disabled = true;
            btn.style.opacity = "0.5";
            wrapper.style.display = "block";

            const updateProgress = (percent, text) => {
                fill.style.width = percent + "%";
                status.innerText = `${text}... ${percent}%`;
            };

            updateProgress(20, "กำลังเชื่อมต่อเซิร์ฟเวอร์");

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            setTimeout(() => updateProgress(50, "กำลังตรวจสอบสิทธิ์"), 500);

            fetch(APPS_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({ action: "login", username: user, password: pass })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    updateProgress(85, "ยืนยันตัวตนสำเร็จ");
                    
                    setTimeout(() => {
                        updateProgress(100, "กำลังนำเข้าสู่ระบบ");
                        
                        sessionStorage.setItem('authToken', data.token);
                        sessionStorage.setItem('fullName', data.fullName);
                        
                        // เริ่มเฟดหน้าจอออก
                        setTimeout(() => {
                            document.body.classList.add('fade-out');
                            setTimeout(() => {
                                window.location.href = 'main.html';
                            }, 500);
                        }, 500);
                    }, 600);
                } else {
                    alert(data.message);
                    resetLogin();
                }
            })
            .catch(error => {
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
                resetLogin();
            });

            function resetLogin() {
                btn.disabled = false;
                btn.style.opacity = "1";
                wrapper.style.display = "none";
                fill.style.width = "0%";
            }
        });
    </script>
</body>
</html>
