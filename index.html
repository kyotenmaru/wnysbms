<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบจัดการพฤติกรรมนักเรียน</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* (ผมย่อโค้ด CSS ความสวยงามไว้ตรงนี้เหมือนเดิมทุกอย่างครับ) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Prompt', sans-serif; }
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(-45deg, #0f172a, #1e3a8a, #831843, #4c0519); background-size: 400% 400%; animation: gradientBG 60s ease infinite; position: relative; overflow: hidden; padding: 20px; }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-image: conic-gradient(rgba(255,255,255,0.025) 90deg, transparent 90deg 180deg, rgba(255,255,255,0.025) 180deg 270deg, transparent 270deg); background-size: 60px 60px; animation: moveCheckerboard 60s linear infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes moveCheckerboard { 0% { background-position: 0px 0px; } 100% { background-position: 120px 120px; } }
        .login-container { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); padding: 45px 40px; border-radius: 24px; width: 100%; max-width: 440px; box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4); text-align: center; color: #ffffff; z-index: 1; }
        .logo-box img { width: 90px; height: 90px; object-fit: cover; border-radius: 50%; border: 3px solid rgba(255, 255, 255, 0.3); margin-bottom: 20px; background-color: rgba(255, 255, 255, 0.1); padding: 5px; box-shadow: 0 8px 25px rgba(0,0,0,0.2); transition: transform 0.3s ease; }
        .logo-box img:hover { transform: scale(1.05); }
        .login-container h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; letter-spacing: 0.5px; }
        .login-container p { font-size: 13px; font-weight: 300; margin-bottom: 30px; color: rgba(255, 255, 255, 0.7); letter-spacing: 1px; }
        .input-group { margin-bottom: 22px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 8px; color: rgba(255, 255, 255, 0.85); font-weight: 400; }
        .input-group input { width: 100%; padding: 14px 16px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 12px; color: #ffffff; font-size: 16px; outline: none; transition: all 0.3s ease; }
        .input-group input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .input-group input:focus { background: rgba(255, 255, 255, 0.15); border-color: #ffffff; box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); }
        .login-btn { width: 100%; padding: 14px; background: #ffffff; color: #831843; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 15px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15); }
        .login-btn:hover { background: #f8f9fa; transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0, 0, 0, 0.25); }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { background: #cccccc; color: #666666; cursor: not-allowed; transform: none; box-shadow: none; }
        .extra-links { display: flex; justify-content: space-between; margin-top: 30px; font-size: 13px; }
        .extra-links a { color: rgba(255, 255, 255, 0.6); text-decoration: none; transition: 0.3s; font-weight: 300; }
        .extra-links a:hover { color: #ffffff; text-decoration: underline; }
        @media screen and (max-width: 480px) { .login-container { padding: 35px 25px; border-radius: 20px; } .logo-box img { width: 75px; height: 75px; } .login-container h2 { font-size: 20px; } .login-container p { font-size: 12px; } .input-group input { padding: 12px 14px; font-size: 15px; } .login-btn { padding: 12px; font-size: 15px; } .extra-links { flex-direction: column; gap: 15px; margin-top: 25px; } }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-box">
            <img src="https://via.placeholder.com/150/ffffff/cccccc?text=LOGO" alt="โลโก้โรงเรียน">
        </div>

        <h2>ระบบจัดการพฤติกรรมนักเรียน</h2>
        <p>Student Behavior Management System</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้งาน" required autocomplete="username">
            </div>
            
            <div class="input-group">
                <label for="password">รหัสผ่าน (Password)</label>
                <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required autocomplete="current-password">
            </div>

            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
        </form>

        <div class="extra-links">
            <a href="#" id="forgotPasswordBtn">ลืมรหัสผ่าน?</a>
            <a href="#" id="contactAdminBtn">ติดต่อผู้ดูแลระบบ</a>
        </div>
    </div>

    <script>
        // 🛑 ขั้นตอนที่ 2: นำ URL ที่ได้จาก Apps Script มาวางในเครื่องหมายคำพูดด้านล่างนี้
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwPtUqT1YUbY9kBmumY5Rrcqy-ib_ShK30-NLIKtihRhIPj_wQWQyeLaiTfavuLMm2-RQ/exec';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            const btn = document.querySelector('.login-btn');
            btn.innerText = "กำลังตรวจสอบ...";
            btn.disabled = true;

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            fetch(APPS_SCRIPT_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain;charset=utf-8" },
                body: JSON.stringify({
                    action: "login",
                    username: user,
                    password: pass
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    // เก็บ Token และข้อมูลส่วนตัวลง Session
                    sessionStorage.setItem('authToken', data.token);
                    sessionStorage.setItem('fullName', data.fullName);
                    sessionStorage.setItem('role', data.role);
                    
                    // สั่งให้เปลี่ยนหน้าไปที่ main.html
                    window.location.href = 'main.html';
                } else {
                    alert(data.message);
                    btn.innerText = "เข้าสู่ระบบ";
                    btn.disabled = false;
                }
            })
            .catch(error => {
                console.error("Error:", error);
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์");
                btn.innerText = "เข้าสู่ระบบ";
                btn.disabled = false;
            });
        });

        // ปุ่มช่วยเหลือเพิ่มเติม
        document.getElementById('forgotPasswordBtn').addEventListener('click', function(e) {
            e.preventDefault(); alert("กรุณาติดต่อผู้ดูแลระบบเพื่อทำการรีเซ็ตรหัสผ่านใหม่ครับ");
        });
        document.getElementById('contactAdminBtn').addEventListener('click', function(e) {
            e.preventDefault(); alert("ช่องทางการติดต่อผู้ดูแลระบบ: แผนกไอที/กิจการนักเรียน");
        });
    </script>

</body>
</html>
